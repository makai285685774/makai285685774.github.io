<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌟 小学英语练习题生成器</title>
  <link rel="stylesheet" href="./css/style.css">
</head>

<body>

  <div class="header">
    <h1>🌟 小学英语练习题生成器</h1>
    <p>AI 驱动 · 即点即出 · 带答案解析 · 语音朗读</p>
  </div>

  <div class="container">

    <!-- 控制面板 -->
    <div class="panel">
      <div class="field">
        <label>📚 题目类型</label>
        <select id="quizType">
          <option value="choice">选择题</option>
          <option value="fill">填空题</option>
          <option value="mixed">混合题型</option>
        </select>
      </div>
      <div class="field">
        <label>🧭 语法主题</label>
        <select id="topic">
          <option value="一般现在时">一般现在时</option>
          <option value="现在进行时">现在进行时</option>
          <option value="一般过去时">一般过去时</option>
          <option value="名词单复数">名词单复数</option>
          <option value="人称代词">人称代词</option>
          <option value="介词搭配">介词搭配</option>
          <option value="形容词比较级">形容词比较级</option>
          <option value="情态动词 can/may/must">情态动词</option>
          <option value="There be 句型">There be 句型</option>
          <option value="疑问句">疑问句</option>
          <option value="综合">🌟 综合（每次不同主题）</option>
        </select>
      </div>
      <div class="field">
        <label>🎯 难度</label>
        <select id="difficulty">
          <option value="三年级">三年级</option>
          <option value="四年级" selected>四年级</option>
          <option value="五年级">五年级</option>
          <option value="六年级">六年级</option>
        </select>
      </div>
      <div class="field">
        <label>📝 题目数量</label>
        <input type="number" id="count" value="5" min="1" max="10">
      </div>
      <button class="btn" id="generateBtn" onclick="handleGenerate()">✨ 生成题目</button>
    </div>

    <!-- 加载动画 -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div>AI 正在生成题目，请稍候…</div>
    </div>

    <!-- 题目区域 -->
    <div id="quizArea"></div>

    <!-- 提交按钮 -->
    <div id="submitArea" style="display:none; text-align:center; margin-top:16px;">
      <button class="btn" onclick="handleSubmit()">✅ 提交答案</button>
    </div>

    <!-- 手机端底部固定提交栏 -->
    <div class="bottom-bar" id="bottomBar">
      <button class="btn btn-bottom" onclick="handleSubmit()">✅ 提交答案</button>
    </div>

    <!-- 结果展示 -->
    <div class="result-bar" id="resultBar">
      <div class="score" id="scoreText">0 / 0</div>
      <div class="msg" id="msgText"></div>
      <div class="actions">
        <button class="btn-outline" onclick="handleRetry()">🔄 再做一遍</button>
        <button class="btn" onclick="handleGenerate()">✨ 换一批题</button>
      </div>
    </div>

    <!-- 抽奖弹窗 -->
    <div class="lottery-overlay" id="lotteryOverlay">
      <div class="lottery-modal">
        <button class="lottery-close" onclick="closeLottery()">✕</button>
        <h2 class="lottery-title">🎉 恭喜通关！快来抽奖吧！</h2>
        <div class="wheel-container">
          <div class="wheel-pointer">▼</div>
          <canvas id="wheelCanvas" width="320" height="320"></canvas>
          <button class="wheel-btn" id="spinBtn" onclick="spinWheel()">🎯 开始抽奖</button>
        </div>
        <div class="prize-result" id="prizeResult" style="display:none;">
          <div class="prize-icon" id="prizeIcon"></div>
          <div class="prize-name" id="prizeName"></div>
          <div class="prize-desc" id="prizeDesc"></div>
          <div class="prize-fun" id="prizeFun"></div>
          <div class="prize-actions">
            <button class="btn-outline" onclick="closeLottery()">📝 继续做题</button>
          </div>
        </div>
      </div>
    </div>

    <canvas id="confettiCanvas" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:999;"></canvas>

  </div>

  <div class="footer">
    基于 <a href="https://puter.com" target="_blank">Puter.js</a> 免费 AI 驱动 ·
    语音朗读 <a href="https://www.microsoft.com/en-us/edge/features/read-aloud" target="_blank">Microsoft Edge TTS</a>（神经网络语音）
  </div>

  <!-- 外部依赖（本地化） -->
  <script src="./lib/puter.js"></script>

  <!-- 项目模块（按依赖顺序加载） -->
  <script src="./js/app.js"></script>
  <script src="./js/tts.js"></script>
  <script src="./js/quiz.js"></script>
  <script src="./js/deep-explain.js"></script>
  <script src="./js/lottery.js"></script>

</body>

</html>
