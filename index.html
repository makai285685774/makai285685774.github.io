<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地音乐播放器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: white;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        header h1 {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* 导入按钮 */
        .upload-section {
            margin-bottom: 20px;
        }

        #fileInput {
            display: none;
        }

        .upload-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.4);
        }

        .upload-btn:active {
            transform: translateY(0);
        }

        /* 当前播放 */
        .current-playing {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .album-cover {
            width: 180px;
            height: 180px;
            margin: 0 auto 15px;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }

        .song-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .song-artist {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 20px;
        }

        /* 进度条 */
        .progress-container {
            margin-bottom: 15px;
        }

        #progressBar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            cursor: pointer;
            appearance: none;
        }

        #progressBar::-webkit-slider-thumb {
            appearance: none;
            width: 16px;
            height: 16px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #progressBar::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }

        /* 控制按钮 */
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .control-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .control-btn.play {
            width: 70px;
            height: 70px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            font-size: 28px;
        }

        .control-btn.play:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(0, 210, 255, 0.4);
        }

        /* 音量控制 */
        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 20px;
            margin-bottom: 20px;
        }

        .volume-control button {
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        #volumeSlider {
            flex: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            cursor: pointer;
            appearance: none;
        }

        #volumeSlider::-webkit-slider-thumb {
            appearance: none;
            width: 14px;
            height: 14px;
            background: white;
            border-radius: 50%;
            cursor: pointer;
        }

        /* 播放模式 */
        .play-mode {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .mode-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
        }

        /* 播放列表 */
        .playlist-section {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
        }

        .playlist-section h2 {
            font-size: 16px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .playlist {
            list-style: none;
        }

        .playlist-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .playlist-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .playlist-item.active {
            background: rgba(0, 210, 255, 0.2);
        }

        .playlist-item .number {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .playlist-item.active .number {
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
        }

        .playlist-item .info {
            flex: 1;
            min-width: 0;
        }

        .playlist-item .title {
            font-size: 14px;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .playlist-item .duration {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }

        .playlist-item .delete-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 14px;
            cursor: pointer;
            opacity: 0;
            transition: all 0.2s;
        }

        .playlist-item:hover .delete-btn {
            opacity: 1;
        }

        .playlist-item .delete-btn:hover {
            background: #ff4757;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: rgba(255, 255, 255, 0.5);
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>🎵 本地音乐播放器</h1>
        </header>

        <div class="upload-section">
            <input type="file" id="fileInput" accept="audio/*" multiple>
            <label for="fileInput" class="upload-btn">📁 导入音乐文件</label>
        </div>

        <div class="current-playing">
            <div class="album-cover" id="albumCover">🎶</div>
            <div class="song-title" id="currentTitle">暂无歌曲</div>
            <div class="song-artist" id="currentArtist">点击上方按钮导入音乐</div>

            <div class="progress-container">
                <input type="range" id="progressBar" min="0" max="100" value="0">
                <div class="time-display">
                    <span id="currentTime">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>

            <div class="controls">
                <button class="control-btn" id="prevBtn" title="上一首">⏮</button>
                <button class="control-btn play" id="playBtn" title="播放/暂停">▶</button>
                <button class="control-btn" id="nextBtn" title="下一首">⏭</button>
            </div>

            <div class="volume-control">
                <button id="muteBtn" title="静音">🔊</button>
                <input type="range" id="volumeSlider" min="0" max="100" value="80">
            </div>

            <div class="play-mode">
                <button class="mode-btn active" id="orderBtn" title="顺序播放">顺序</button>
                <button class="mode-btn" id="randomBtn" title="随机播放">随机</button>
            </div>
        </div>

        <div class="playlist-section">
            <h2>📋 播放列表</h2>
            <ul class="playlist" id="playlist">
                <li class="empty-state">
                    <div class="icon">🎵</div>
                    <p>暂无音乐</p>
                    <p style="font-size: 12px; margin-top: 5px;">点击上方按钮导入音乐文件</p>
                </li>
            </ul>
        </div>
    </div>

    <script>
        // 音频对象
        const audio = new Audio();
        audio.volume = 0.8;

        // 播放列表
        let playlist = [];
        let currentIndex = 0;
        let isPlaying = false;
        let isRandom = false;
        let isMuted = false;

        // DOM元素
        const fileInput = document.getElementById('fileInput');
        const playlistEl = document.getElementById('playlist');
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressBar = document.getElementById('progressBar');
        const volumeSlider = document.getElementById('volumeSlider');
        const muteBtn = document.getElementById('muteBtn');
        const currentTitle = document.getElementById('currentTitle');
        const currentArtist = document.getElementById('currentArtist');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const albumCover = document.getElementById('albumCover');
        const orderBtn = document.getElementById('orderBtn');
        const randomBtn = document.getElementById('randomBtn');

        // 格式化时间
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // 更新播放列表UI
        function updatePlaylistUI() {
            if (playlist.length === 0) {
                playlistEl.innerHTML = `
                    <li class="empty-state">
                        <div class="icon">🎵</div>
                        <p>暂无音乐</p>
                        <p style="font-size: 12px; margin-top: 5px;">点击上方按钮导入音乐文件</p>
                    </li>
                `;
                return;
            }

            playlistEl.innerHTML = playlist.map((song, index) => `
                <li class="playlist-item ${index === currentIndex ? 'active' : ''}" data-index="${index}">
                    <span class="number">${index + 1}</span>
                    <div class="info">
                        <div class="title">${song.name}</div>
                        <div class="duration">${formatTime(song.duration)}</div>
                    </div>
                    <button class="delete-btn" data-index="${index}" title="删除">✕</button>
                </li>
            `).join('');
        }

        // 加载歌曲
        function loadSong(index) {
            if (playlist.length === 0) return;

            currentIndex = index;
            const song = playlist[index];
            audio.src = URL.createObjectURL(song.file);
            currentTitle.textContent = song.name;
            currentArtist.textContent = `播放列表 - ${index + 1}/${playlist.length}`;

            // 更新封面颜色
            const colors = [
                'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
                'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
                'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)',
                'linear-gradient(135deg, #fa709a 0%, #fee140 100%)',
            ];
            albumCover.style.background = colors[index % colors.length];

            // 更新播放列表高亮
            updatePlaylistUI();

            // 自动播放
            if (isPlaying) {
                audio.play();
            }
        }

        // 播放
        function play() {
            if (playlist.length === 0) return;
            audio.play();
            isPlaying = true;
            playBtn.textContent = '⏸';
        }

        // 暂停
        function pause() {
            audio.pause();
            isPlaying = false;
            playBtn.textContent = '▶';
        }

        // 切换播放/暂停
        function togglePlay() {
            if (isPlaying) {
                pause();
            } else {
                play();
            }
        }

        // 上一首
        function prev() {
            if (playlist.length === 0) return;

            if (isRandom) {
                currentIndex = Math.floor(Math.random() * playlist.length);
            } else {
                currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
            }
            loadSong(currentIndex);
        }

        // 下一首
        function next() {
            if (playlist.length === 0) return;

            if (isRandom) {
                currentIndex = Math.floor(Math.random() * playlist.length);
            } else {
                currentIndex = (currentIndex + 1) % playlist.length;
            }
            loadSong(currentIndex);
        }

        // 删除歌曲
        function removeSong(index) {
            const song = playlist[index];
            URL.revokeObjectURL(song.url);

            playlist.splice(index, 1);

            // 如果删除的是当前播放的歌曲
            if (index === currentIndex) {
                if (playlist.length === 0) {
                    audio.src = '';
                    currentTitle.textContent = '暂无歌曲';
                    currentArtist.textContent = '点击上方按钮导入音乐';
                    pause();
                } else {
                    currentIndex = Math.min(currentIndex, playlist.length - 1);
                    loadSong(currentIndex);
                }
            } else if (index < currentIndex) {
                currentIndex--;
            }

            updatePlaylistUI();
        }

        // 切换播放模式
        function toggleMode() {
            isRandom = !isRandom;
            orderBtn.classList.toggle('active', !isRandom);
            randomBtn.classList.toggle('active', isRandom);
        }

        // 切换静音
        function toggleMute() {
            isMuted = !isMuted;
            audio.muted = isMuted;
            muteBtn.textContent = isMuted ? '🔇' : '🔊';
        }

        // 事件监听
        fileInput.addEventListener('change', (e) => {
            alert('请导入音乐文件');
            const files = Array.from(e.target.files);

            files.forEach(file => {
                const audioTemp = new Audio();
                audioTemp.src = URL.createObjectURL(file);

                audioTemp.onloadedmetadata = () => {
                    playlist.push({
                        name: file.name.replace(/\.[^/.]+$/, ''),
                        file: file,
                        duration: audioTemp.duration
                    });

                    URL.revokeObjectURL(audioTemp.src);
                    updatePlaylistUI();

                    // 如果是第一首歌，自动加载
                    if (playlist.length === 1) {
                        loadSong(0);
                    }
                };
            });

            // 清空input以便重新选择
            fileInput.value = '';
        });

        playBtn.addEventListener('click', togglePlay);
        prevBtn.addEventListener('click', prev);
        nextBtn.addEventListener('click', next);

        orderBtn.addEventListener('click', toggleMode);
        randomBtn.addEventListener('click', toggleMode);

        muteBtn.addEventListener('click', toggleMute);

        volumeSlider.addEventListener('input', (e) => {
            audio.volume = e.target.value / 100;
            isMuted = audio.volume === 0;
            muteBtn.textContent = isMuted ? '🔇' : '🔊';
        });

        progressBar.addEventListener('input', (e) => {
            const time = (e.target.value / 100) * audio.duration;
            audio.currentTime = time;
        });

        // 音频事件
        audio.addEventListener('timeupdate', () => {
            const progress = (audio.currentTime / audio.duration) * 100;
            progressBar.value = isNaN(progress) ? 0 : progress;
            currentTimeEl.textContent = formatTime(audio.currentTime);
        });

        audio.addEventListener('loadedmetadata', () => {
            durationEl.textContent = formatTime(audio.duration);
            progressBar.value = 0;
        });

        audio.addEventListener('ended', () => {
            next();
        });

        audio.addEventListener('error', () => {
            console.error('音频播放出错');
            next();
        });

        // 播放列表点击事件
        playlistEl.addEventListener('click', (e) => {
            const target = e.target;
            const listItem = target.closest('.playlist-item');

            if (listItem) {
                const deleteBtn = target.closest('.delete-btn');
                if (deleteBtn) {
                    const index = parseInt(deleteBtn.dataset.index);
                    removeSong(index);
                } else {
                    const index = parseInt(listItem.dataset.index);
                    loadSong(index);
                    if (!isPlaying) {
                        play();
                    }
                }
            }
        });

        // 触摸设备优化
        // ['touchstart', 'touchmove', 'touchend'].forEach(event => {
        //     document.addEventListener(event, (e) => {
        //         e.preventDefault();
        //     }, { passive: false });
        // });
    </script>
</body>

</html>
